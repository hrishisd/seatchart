<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Seat Chart</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ── Toolbar ─────────────────────────────────────────────────────── -->
  <header id="toolbar">
    <h1>Seat Chart</h1>

    <div class="toolbar-divider"></div>

    <div class="toolbar-group">
      <label class="toolbar-label" for="tables-input">Tables</label>
      <input type="number" id="tables-input" class="toolbar-number" min="0" max="99">
    </div>

    <div class="toolbar-group">
      <label class="toolbar-label" for="min-cap-input">Min</label>
      <input type="number" id="min-cap-input" class="toolbar-number" min="0" max="99" placeholder="—">
    </div>

    <div class="toolbar-group">
      <label class="toolbar-label" for="max-cap-input">Max</label>
      <input type="number" id="max-cap-input" class="toolbar-number" min="0" max="99" placeholder="—">
    </div>

    <div class="toolbar-divider"></div>

    <div class="toolbar-add">
      <input type="text" id="add-guest-input" class="toolbar-text" placeholder="First Last">
      <button id="add-guest-btn" class="toolbar-btn">Add Guest</button>
    </div>

    <div id="toolbar-status" class="toolbar-status"></div>
  </header>

  <!-- ── Main layout ─────────────────────────────────────────────────── -->
  <main id="app">

    <!-- Unassigned guests / clusters -->
    <aside id="unassigned-panel">
      <!-- Rendered by render.js -->
    </aside>

    <!-- Table circles -->
    <section id="tables-panel">
      <!-- Rendered by render.js -->
    </section>

  </main>

  <script type="module" src="js/app.js"></script>
</body>
</html>
